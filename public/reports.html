<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap");

      :root {
        --bg: #f7f8f9;
        --card: #ffffff;
        --text: #172b4d;
        --dim: #626f86;
        --muted: #8993a4;
        --border: rgba(9, 30, 66, 0.08);
        --track: rgba(9, 30, 66, 0.09);

        --green-fg: #22a06b; --green-bg: #e7f7ef; --green-chip: #d3f0e0;
        --blue-fg: #4c6ef5;  --blue-bg: #eef1fe;  --blue-chip: #dfe6fd;
        --amber-fg: #d9730d; --amber-bg: #fdf0e3; --amber-chip: #fae2cb;
        --red-fg: #e5484d;   --red-bg: #fdecec;   --red-chip: #fbd8d8;

        --export-bg: #1d2b3a;
        --export-fg: #ffffff;
      }

      [data-theme="dark"] {
        --bg: #1d2125;
        --card: #22272b;
        --text: #e2e8ee;
        --dim: #8590a2;
        --muted: #6b788a;
        --border: rgba(255, 255, 255, 0.08);
        --track: rgba(255, 255, 255, 0.12);

        --green-fg: #6ee7b7; --green-bg: rgba(75,206,151,.12); --green-chip: rgba(75,206,151,.22);
        --blue-fg: #85b8ff;  --blue-bg: rgba(87,157,255,.12);  --blue-chip: rgba(87,157,255,.22);
        --amber-fg: #fbbf7c; --amber-bg: rgba(245,160,95,.12); --amber-chip: rgba(245,160,95,.22);
        --red-fg: #ff8f8f;   --red-bg: rgba(229,72,77,.14);    --red-chip: rgba(229,72,77,.24);

        --export-bg: #0c66e4;
        --export-fg: #ffffff;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        font-size: 13px;
      }

      .wrap { padding: 16px; max-width: 1100px; margin: 0 auto; }

      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 14px;
      }
      .topbar h1 { font-size: 16px; font-weight: 700; color: var(--text); }

      .seg { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
      .seg button {
        padding: 7px 14px; font-family: inherit; font-size: 12px;
        background: transparent; color: var(--dim); border: none; cursor: pointer;
      }
      .seg button.on { background: var(--card); color: var(--text); font-weight: 600; }

      .card {
        background: var(--card); border: 1px solid var(--border);
        border-radius: 12px;
      }

      .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; }
      .metric { padding: 15px; }
      .chip {
        width: 36px; height: 36px; border-radius: 9px;
        display: flex; align-items: center; justify-content: center; margin-bottom: 11px;
      }
      .metric .val { font-size: 27px; font-weight: 700; line-height: 1; }
      .metric .lbl { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--dim); margin-top: 6px; }

      .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
      .chart-h { font-size: 13px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }

      .prod { display: flex; align-items: center; gap: 13px; padding: 13px 16px; margin-bottom: 16px; }
      .prod .cap { font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
      .prod .day { font-size: 18px; font-weight: 700; margin-top: 2px; }
      .prod .note { margin-left: auto; font-size: 12px; color: var(--dim); max-width: 240px; text-align: right; }

      .sec-h { font-size: 13px; font-weight: 600; margin-bottom: 8px; }

      table { width: 100%; border-collapse: collapse; }
      th { font-size: 10.5px; letter-spacing: .03em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 9px 8px; font-weight: 600; }
      td { padding: 12px 8px; font-size: 12.5px; border-top: 1px solid var(--border); }
      .track { height: 6px; border-radius: 4px; background: var(--track); overflow: hidden; flex: 1; }
      .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; white-space: nowrap; }

      .export {
        width: 100%; margin-top: 16px; padding: 13px;
        background: var(--export-bg); color: var(--export-fg);
        border: none; border-radius: 10px; font-family: inherit;
        font-size: 13px; font-weight: 600; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
      }
      .export:hover { filter: brightness(1.08); }

      svg text { font-family: "DM Sans", sans-serif; }
    </style>
  </head>

  <body>
    <div class="wrap" id="app"></div>

    <script>
      /* global TrelloPowerUp */
      const t = TrelloPowerUp.iframe();

      /* ══════════════════════════════════════════════════════════════
         SAMPLE DATA — replace the two objects below with real board data.
         See computeReport() at the bottom for where to wire t.get(...).
      ══════════════════════════════════════════════════════════════ */
      const DATA = {
        weekly: {
          metrics: { active: 15, achieved: 1, hours: 11.5, overtime: 1 },
          deadlineTrend: [54, 70, 42, 78, 48, 62],   // bar chart (% per period)
          hoursTracked: [4, 6, 5, 8, 9, 11.5],        // line chart (hrs per day)
          productivityDay: "Tuesday",
          history: [
            { range: "Jun 28 – Jul 04, 2026", total: 12, completed: 9, overtime: 1, deadline: 91, rating: "Excellent" },
            { range: "Jun 21 – Jun 26, 2026", total: 12, completed: 9, overtime: 1, deadline: 88, rating: "Good" },
            { range: "Jun 14 – Jun 19, 2026", total: 12, completed: 9, overtime: 1, deadline: 74, rating: "Need attention" },
          ],
        },
        monthly: {
          metrics: { active: 48, achieved: 6, hours: 142, overtime: 4 },
          deadlineTrend: [61, 58, 72, 80],
          hoursTracked: [28, 35, 40, 39],
          productivityDay: "Wednesday",
          history: [
            { range: "Jun 2026", total: 48, completed: 39, overtime: 4, deadline: 86, rating: "Good" },
            { range: "May 2026", total: 44, completed: 40, overtime: 2, deadline: 93, rating: "Excellent" },
            { range: "Apr 2026", total: 41, completed: 31, overtime: 5, deadline: 71, rating: "Need attention" },
          ],
        },
      };

      let mode = "weekly";

      const SERIES = ["#22a06b", "#4c6ef5", "#e9a23b", "#7c6ff0", "#1baf7a", "#e5684a"];
      const icon = (name) =>
        `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${name}</svg>`;
      const ICONS = {
        check: '<rect x="3" y="3" width="18" height="18" rx="4"/><path d="m8 12 3 3 5-6"/>',
        target: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4"/>',
        clock: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
        warn: '<path d="M12 4 2 20h20L12 4Z"/><path d="M12 10v4M12 17.5v.5"/>',
        cal: '<rect x="3" y="4" width="18" height="17" rx="3"/><path d="M3 9h18M8 2v4M16 2v4"/><path d="m10 15 1.4 1.4L14 14"/>',
        download: '<path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 21h16"/>',
      };

      function barChart(values) {
        const w = 280, h = 130, pad = 14, base = h - 18;
        const max = Math.max(...values, 1);
        const bw = 20, gap = (w - pad * 2 - bw * values.length) / (values.length - 1 || 1);
        let bars = "";
        values.forEach((v, i) => {
          const bh = Math.round((v / max) * (base - 12));
          const x = pad + i * (bw + gap);
          const y = base - bh;
          bars += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="4" fill="${SERIES[i % SERIES.length]}"/>`;
        });
        return `<svg viewBox="0 0 ${w} ${h}" width="100%" role="img" aria-label="Deadline achievement bar chart">
          <line x1="${pad}" y1="${base}" x2="${w - pad}" y2="${base}" stroke="var(--border)"/>${bars}</svg>`;
      }

      function lineChart(values) {
        const w = 280, h = 130, pad = 16, base = h - 18, top = 14;
        const max = Math.max(...values, 1);
        const step = (w - pad * 2) / (values.length - 1 || 1);
        const pts = values.map((v, i) => {
          const x = pad + i * step;
          const y = base - (v / max) * (base - top);
          return [x, y];
        });
        const poly = pts.map((p) => `${p[0]},${p[1].toFixed(1)}`).join(" ");
        const dots = pts.map((p) => `<circle cx="${p[0]}" cy="${p[1].toFixed(1)}" r="3.5" fill="#1baf7a"/>`).join("");
        return `<svg viewBox="0 0 ${w} ${h}" width="100%" role="img" aria-label="Hours tracked line chart">
          <line x1="${pad}" y1="${base}" x2="${w - pad}" y2="${base}" stroke="var(--border)"/>
          <polyline points="${poly}" fill="none" stroke="#1baf7a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg>`;
      }

      function ratingColors(r) {
        if (r === "Excellent") return ["var(--green-bg)", "var(--green-fg)", "#22a06b"];
        if (r === "Good") return ["var(--blue-bg)", "var(--blue-fg)", "#4c6ef5"];
        return ["var(--amber-bg)", "var(--amber-fg)", "#e9a23b"];
      }

      function render() {
        const d = DATA[mode];
        const m = d.metrics;

        const rows = d.history.map((r) => {
          const [bg, fg, bar] = ratingColors(r.rating);
          return `<tr>
            <td style="color:var(--dim)">${r.range}</td>
            <td>${r.total}</td><td>${r.completed}</td><td>${r.overtime}</td>
            <td><div style="display:flex;align-items:center;gap:7px">
              <div class="track"><div style="width:${r.deadline}%;height:100%;background:${bar}"></div></div>
              <span style="font-size:11px;color:var(--dim)">${r.deadline}%</span></div></td>
            <td><span class="badge" style="background:${bg};color:${fg}">${r.rating}</span></td>
          </tr>`;
        }).join("");

        document.getElementById("app").innerHTML = `
          <div class="topbar">
            <h1>History reports &amp; export</h1>
            <div class="seg">
              <button data-mode="weekly" class="${mode === "weekly" ? "on" : ""}">Weekly report</button>
              <button data-mode="monthly" class="${mode === "monthly" ? "on" : ""}">Monthly report</button>
            </div>
          </div>

          <div class="metrics">
            <div class="card metric">
              <div class="chip" style="background:var(--green-bg);color:var(--green-fg)">${icon(ICONS.check)}</div>
              <div class="val" style="color:var(--green-fg)">${m.active}</div>
              <div class="lbl">Total active cards</div>
            </div>
            <div class="card metric">
              <div class="chip" style="background:var(--blue-bg);color:var(--blue-fg)">${icon(ICONS.target)}</div>
              <div class="val" style="color:var(--blue-fg)">${m.achieved}</div>
              <div class="lbl">Achieved goals</div>
            </div>
            <div class="card metric">
              <div class="chip" style="background:var(--amber-bg);color:var(--amber-fg)">${icon(ICONS.clock)}</div>
              <div class="val" style="color:var(--amber-fg)">${m.hours}</div>
              <div class="lbl">Hours tracked</div>
            </div>
            <div class="card metric">
              <div class="chip" style="background:var(--red-bg);color:var(--red-fg)">${icon(ICONS.warn)}</div>
              <div class="val" style="color:var(--red-fg)">${m.overtime}</div>
              <div class="lbl">Overtime warning</div>
            </div>
          </div>

          <div class="charts">
            <div class="card" style="padding:15px">
              <div class="chart-h" style="color:var(--blue-fg)">${icon('<path d="M3 3v18h18"/><path d="M7 14v3M12 9v8M17 12v5"/>')}<span style="color:var(--text)">Deadline achievement trend</span></div>
              ${barChart(d.deadlineTrend)}
            </div>
            <div class="card" style="padding:15px">
              <div class="chart-h" style="color:var(--green-fg)">${icon('<path d="M3 3v18h18"/><path d="m6 15 4-4 3 3 5-6"/>')}<span style="color:var(--text)">Total hours tracked</span></div>
              ${lineChart(d.hoursTracked)}
            </div>
          </div>

          <div class="card prod">
            <div class="chip" style="background:var(--blue-bg);color:var(--blue-fg);margin:0">${icon(ICONS.cal)}</div>
            <div>
              <div class="cap">Most productivity day</div>
              <div class="day">${d.productivityDay}</div>
            </div>
            <div class="note">Highest concentration of tasks completed on the board</div>
          </div>

          <div class="sec-h">Stored history reports</div>
          <div class="card" style="padding:4px 12px">
            <table>
              <thead><tr>
                <th style="width:26%">Period / date range</th><th style="width:11%">Total</th>
                <th style="width:13%">Completed</th><th style="width:11%">Overtime</th>
                <th style="width:20%">Deadline</th><th style="width:19%">Rating</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>

          <button class="export" id="export">${icon(ICONS.download)}Export ${mode} CSV</button>
        `;

        document.querySelectorAll(".seg button").forEach((b) =>
          b.addEventListener("click", () => { mode = b.dataset.mode; render(); })
        );
        document.getElementById("export").addEventListener("click", exportCSV);
        t.sizeTo("body").catch(() => {});
      }

      function exportCSV() {
        const d = DATA[mode];
        const header = ["Period / date range", "Total cards", "Completed", "Overtime", "Deadline achieved (%)", "Performance rating"];
        const lines = d.history.map((r) =>
          [r.range, r.total, r.completed, r.overtime, r.deadline, r.rating]
            .map((c) => `"${String(c).replace(/"/g, '""')}"`).join(",")
        );
        const csv = [header.join(","), ...lines].join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `progress-${mode}-report.csv`;
        a.click();
        URL.revokeObjectURL(url);
      }

      /* ══════════════════════════════════════════════════════════════
         computeReport(t) — build the real DATA from the board.
         Wire this to whatever v1 already persists, e.g.:
           const mapped = await t.get("board", "shared", "mappedCards");
           const cardDefaults = await t.get("board", "shared", "cardDefaults");
         then aggregate elapsed / estimated / progress per card into
         metrics, trends, and history, and assign into DATA before render().
      ══════════════════════════════════════════════════════════════ */

      Promise.resolve(t.getContext ? t.getContext() : null)
        .then((ctx) => {
          const theme =
            (ctx && ctx.theme) ||
            (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
        })
        .catch(() => {})
        .finally(render);
    </script>
  </body>
</html>
