<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./report-data.js"></script>

    <style>
      :root{
        --bg:#f7f8f9;--card:#fff;--text:#172b4d;--dim:#626f86;--muted:#8993a4;
        --border:rgba(9,30,66,.08);--track:rgba(9,30,66,.09);
        --green-fg:#22a06b;--green-bg:#e7f7ef;--blue-fg:#4c6ef5;--blue-bg:#eef1fe;
        --amber-fg:#d9730d;--amber-bg:#fdf0e3;--red-fg:#e5484d;--red-bg:#fdecec;
        --export-bg:#1d2b3a;--export-fg:#fff;--accent:#0c66e4;
      }
      [data-theme="dark"]{
        --bg:#1d2125;--card:#22272b;--text:#e2e8ee;--dim:#8590a2;--muted:#6b788a;
        --border:rgba(255,255,255,.08);--track:rgba(255,255,255,.12);
        --green-fg:#6ee7b7;--green-bg:rgba(75,206,151,.12);--blue-fg:#85b8ff;--blue-bg:rgba(87,157,255,.12);
        --amber-fg:#fbbf7c;--amber-bg:rgba(245,160,95,.12);--red-fg:#ff8f8f;--red-bg:rgba(229,72,77,.14);
        --export-bg:#0c66e4;--export-fg:#fff;--accent:#579dff;
      }
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{background:var(--bg);color:var(--text);font-family:"DM Sans",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;font-size:13px}
      .wrap{padding:16px;max-width:1100px;margin:0 auto}
      .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
      .topbar h1{font-size:16px;font-weight:700}
      .seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
      .seg button{padding:7px 14px;font-family:inherit;font-size:12px;background:transparent;color:var(--dim);border:none;cursor:pointer}
      .seg button.on{background:var(--card);color:var(--text);font-weight:600}
      .card{background:var(--card);border:1px solid var(--border);border-radius:12px}
      .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
      .metric{padding:15px}
      .chip{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:11px}
      .metric .val{font-size:27px;font-weight:700;line-height:1}
      .metric .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);margin-top:6px}
      .charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
      .chart-h{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px}
      .prod{display:flex;align-items:center;gap:13px;padding:13px 16px;margin-bottom:16px}
      .prod .cap{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
      .prod .day{font-size:18px;font-weight:700;margin-top:2px}
      .prod .note{margin-left:auto;font-size:12px;color:var(--dim);max-width:240px;text-align:right}
      .sec-h{font-size:13px;font-weight:600;margin-bottom:8px}
      table{width:100%;border-collapse:collapse}
      th{font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);text-align:left;padding:9px 8px;font-weight:600}
      td{padding:12px 8px;font-size:12.5px;border-top:1px solid var(--border)}
      .track{height:6px;border-radius:4px;background:var(--track);overflow:hidden;flex:1}
      .badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
      .export{width:100%;margin-top:16px;padding:13px;background:var(--export-bg);color:var(--export-fg);border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
      .export:hover{filter:brightness(1.08)}
      .state{padding:48px 24px;text-align:center;color:var(--dim)}
      .state h2{font-size:15px;color:var(--text);margin-bottom:6px}
      .state button{margin-top:14px;padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
      .empty-cell{padding:22px;text-align:center;color:var(--muted);font-size:12px}
      svg text{font-family:"DM Sans",sans-serif}
    </style>
  </head>

  <body>
    <div class="wrap" id="app"><div class="state">Loading report…</div></div>

    <script src="./reports.js"></script>
  </body>
</html>
