<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <style>
      :root {
        --surface: #1d2125;
        --surface-raised: #282e33;
        --surface-overlay: #2c333a;
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.50);
        --divider: rgba(255, 255, 255, 0.10);
        --accent: #579dff;
        --accent-hover: #85b8ff;
        --green: #22c55e;
        --green-bg: rgba(34, 197, 94, 0.15);
        --tag-design-bg: rgba(87, 157, 255, 0.20);
        --tag-design-text: #85b8ff;
        --tag-story-bg: rgba(163, 113, 247, 0.20);
        --tag-story-text: #c2b5ff;
        --tag-dev-bg: rgba(34, 197, 94, 0.20);
        --tag-dev-text: #4ade80;
        --tag-orange-bg: rgba(251, 146, 60, 0.20);
        --tag-orange-text: #fb923c;
        --tag-red-bg: rgba(248, 113, 113, 0.20);
        --tag-red-text: #f87171;
        --tag-yellow-bg: rgba(250, 204, 21, 0.20);
        --tag-yellow-text: #facc15;
        --checkbox-border: rgba(255, 255, 255, 0.28);
        --start-btn: #1d9bf0;
        --start-btn-hover: #1a8cd8;
        --start-btn-disabled: rgba(29, 155, 240, 0.30);
        --search-bg: rgba(255, 255, 255, 0.07);
        --search-focus: rgba(87, 157, 255, 0.18);
        --close-btn-hover: rgba(255, 255, 255, 0.10);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --surface: #ffffff;
          --surface-raised: #f4f5f7;
          --surface-overlay: #ebecf0;
          --text: #172b4d;
          --muted: rgba(23, 43, 77, 0.55);
          --divider: rgba(9, 30, 66, 0.12);
          --accent: #0c66e4;
          --accent-hover: #0052cc;
          --green: #1d8348;
          --green-bg: rgba(29, 131, 72, 0.10);
          --tag-design-bg: rgba(12, 102, 228, 0.10);
          --tag-design-text: #0c66e4;
          --tag-story-bg: rgba(120, 56, 219, 0.10);
          --tag-story-text: #7838db;
          --tag-dev-bg: rgba(29, 131, 72, 0.10);
          --tag-dev-text: #1d8348;
          --tag-orange-bg: rgba(217, 119, 6, 0.12);
          --tag-orange-text: #d97706;
          --tag-red-bg: rgba(220, 38, 38, 0.10);
          --tag-red-text: #dc2626;
          --tag-yellow-bg: rgba(202, 138, 4, 0.12);
          --tag-yellow-text: #ca8a04;
          --checkbox-border: rgba(9, 30, 66, 0.28);
          --start-btn: #0c66e4;
          --start-btn-hover: #0052cc;
          --start-btn-disabled: rgba(12, 102, 228, 0.30);
          --search-bg: rgba(9, 30, 66, 0.05);
          --search-focus: rgba(12, 102, 228, 0.12);
          --close-btn-hover: rgba(0, 0, 0, 0.07);
        }
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: var(--surface);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        font-size: 14px;
        overflow: hidden;
      }

      .popup {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-height: 560px;
        width: 100%;
      }

      /* ── Header ── */
      .popup-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 14px 10px 16px;
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .popup-header h2 {
        font-size: 14.5px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 7px;
        letter-spacing: -0.01em;
        color: var(--text);
      }

      .bolt-icon {
        color: var(--accent);
        font-size: 15px;
        line-height: 1;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        transition: color 0.12s, background 0.12s;
        flex-shrink: 0;
      }

      .icon-btn:hover {
        color: var(--text);
        background: var(--close-btn-hover);
      }

      .icon-btn svg {
        width: 15px;
        height: 15px;
        fill: currentColor;
      }

      /* ── Sub-label ── */
      .sub-label {
        padding: 0 16px 10px;
        font-size: 12px;
        color: var(--muted);
        flex-shrink: 0;
      }

      /* ── Search ── */
      .search-wrap {
        padding: 0 12px 10px;
        flex-shrink: 0;
        position: relative;
      }

      .search-icon {
        position: absolute;
        left: 22px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
        display: flex;
        align-items: center;
      }

      .search-icon svg {
        width: 13px;
        height: 13px;
        fill: currentColor;
      }

      #searchInput {
        width: 100%;
        padding: 7px 12px 7px 32px;
        background: var(--search-bg);
        border: 1.5px solid var(--divider);
        border-radius: 7px;
        color: var(--text);
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s, background 0.15s;
      }

      #searchInput::placeholder { color: var(--muted); }

      #searchInput:focus {
        border-color: var(--accent);
        background: var(--search-focus);
      }

      /* ── Section labels ── */
      .section-label {
        padding: 8px 16px 5px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        flex-shrink: 0;
      }

      /* ── Card list ── */
      .card-list {
        flex: 1;
        overflow-y: auto;
        padding: 2px 6px 4px;
        scrollbar-width: thin;
        scrollbar-color: var(--divider) transparent;
      }

      .card-list::-webkit-scrollbar { width: 4px; }
      .card-list::-webkit-scrollbar-track { background: transparent; }
      .card-list::-webkit-scrollbar-thumb {
        background: var(--divider);
        border-radius: 99px;
      }

      .card-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 7px;
        cursor: pointer;
        transition: background 0.10s;
        user-select: none;
      }

      .card-item:hover { background: var(--search-bg); }

      .card-item.selected {
        background: var(--green-bg);
      }

      /* Custom checkbox */
      .cb-wrap {
        flex-shrink: 0;
        width: 17px;
        height: 17px;
        border: 1.8px solid var(--checkbox-border);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.12s, background 0.12s;
      }

      .card-item.selected .cb-wrap {
        background: var(--green);
        border-color: var(--green);
      }

      .cb-check {
        display: none;
        color: #fff;
        font-size: 10px;
        font-weight: 900;
        line-height: 1;
      }

      .card-item.selected .cb-check { display: block; }

      .card-name {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text);
        letter-spacing: -0.005em;
      }

      .card-tag {
        flex-shrink: 0;
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 4px;
        letter-spacing: 0.01em;
      }

      .tag-design  { background: var(--tag-design-bg);  color: var(--tag-design-text); }
      .tag-story   { background: var(--tag-story-bg);   color: var(--tag-story-text); }
      .tag-dev     { background: var(--tag-dev-bg);     color: var(--tag-dev-text); }
      .tag-orange  { background: var(--tag-orange-bg);  color: var(--tag-orange-text); }
      .tag-red     { background: var(--tag-red-bg);     color: var(--tag-red-text); }
      .tag-yellow  { background: var(--tag-yellow-bg);  color: var(--tag-yellow-text); }

      .section-group { margin-bottom: 2px; }

      /* Divider between section groups */
      .section-group + .section-group {
        border-top: 1px solid var(--divider);
        padding-top: 2px;
        margin-top: 4px;
      }

      .empty-state {
        padding: 24px 16px;
        text-align: center;
        color: var(--muted);
        font-size: 13px;
      }

      /* ── Footer ── */
      .popup-footer {
        padding: 11px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--divider);
        flex-shrink: 0;
      }

      .selected-count {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
        transition: color 0.15s;
      }

      .selected-count.has-selection { color: var(--text); }

      #startMappingBtn {
        padding: 7px 18px;
        border: none;
        border-radius: 7px;
        background: var(--start-btn);
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
        letter-spacing: 0.01em;
      }

      #startMappingBtn:hover:not(:disabled) { background: var(--start-btn-hover); }

      #startMappingBtn:disabled {
        background: var(--start-btn-disabled);
        cursor: not-allowed;
      }

      /* Loading state */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
        color: var(--muted);
        font-size: 13px;
        gap: 8px;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--divider);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div class="popup">

      <!-- Header -->
      <div class="popup-header">
        <div class="header-left">
          <h2>
            <span class="bolt-icon">
              <!-- Lightning bolt SVG -->
              <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor" style="color:var(--accent)">
                <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/>
              </svg>
            </span>
            Progress Cards
          </h2>
        </div>
        <div class="header-actions">
          <!-- Gear / Settings -->
          <button class="icon-btn" id="gearBtn" title="Settings">
            <svg viewBox="0 0 24 24">
              <path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.81c-.14-.24-.42-.32-.66-.24l-2.74 1.1c-.57-.44-1.18-.79-1.85-1.06L14.07 2.1C14 1.84 13.77 1.66 13.5 1.66h-3c-.27 0-.5.18-.57.44l-.42 2.9c-.67.27-1.28.62-1.85 1.06L4.92 5c-.24-.08-.52 0-.66.24L2.06 9.05c-.14.23-.08.54.13.7l2.32 1.82C4.47 11.86 4.44 12.21 4.44 12.5s.03.74.07 1.08l-2.32 1.82c-.21.16-.27.46-.13.7l2.2 3.81c.14.24.42.32.66.24l2.74-1.1c.57.44 1.18.79 1.85 1.06l.42 2.9c.07.26.3.44.57.44h3c.27 0 .5-.18.57-.44l.42-2.9c.67-.27 1.28-.62 1.85-1.06l2.74 1.1c.24.08.52 0 .66-.24l2.2-3.81c.14-.24.08-.54-.13-.7l-2.32-1.82z"/>
            </svg>
          </button>
          <!-- Close -->
          <button class="icon-btn" id="closeBtn" title="Close">
            <svg viewBox="0 0 24 24">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="sub-label">Select cards to start mapping progress</div>

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon">
          <svg viewBox="0 0 24 24">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </span>
        <input type="text" id="searchInput" placeholder="Search cards…" autocomplete="off" />
      </div>

      <!-- Card list -->
      <div class="card-list" id="cardList">
        <div class="loading"><div class="spinner"></div> Loading cards…</div>
      </div>

      <!-- Footer -->
      <div class="popup-footer">
        <span class="selected-count" id="selectedCount">0 cards selected</span>
        <button id="startMappingBtn" disabled>Start Mapping</button>
      </div>
    </div>

    <script src="./progress-cards.js?v=20260601-1"></script>
    <script>
      // Close button wires up to Trello closePopup
      document.getElementById('closeBtn').addEventListener('click', function() {
        if (typeof TrelloPowerUp !== 'undefined') {
          const t = TrelloPowerUp.iframe();
          t.closePopup();
        }
      });
    </script>
  </body>
</html>
