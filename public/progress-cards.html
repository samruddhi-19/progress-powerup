<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <style>
      :root {
        --surface: #1d2125;
        --surface-raised: #282e33;
        --surface-overlay: #2c333a;
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.55);
        --divider: rgba(255, 255, 255, 0.1);
        --accent: #579dff;
        --accent-hover: #85b8ff;
        --green: #22c55e;
        --green-bg: rgba(34, 197, 94, 0.15);
        --tag-design-bg: rgba(87, 157, 255, 0.18);
        --tag-design-text: #85b8ff;
        --tag-story-bg: rgba(163, 113, 247, 0.18);
        --tag-story-text: #c2b5ff;
        --tag-dev-bg: rgba(34, 197, 94, 0.18);
        --tag-dev-text: #4ade80;
        --checkbox-border: rgba(255, 255, 255, 0.3);
        --start-btn: #579dff;
        --start-btn-hover: #388bff;
        --start-btn-disabled: rgba(87, 157, 255, 0.35);
        --search-bg: rgba(255, 255, 255, 0.08);
        --search-focus: rgba(87, 157, 255, 0.35);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --surface: #ffffff;
          --surface-raised: #f4f5f7;
          --surface-overlay: #ebecf0;
          --text: #172b4d;
          --muted: rgba(23, 43, 77, 0.62);
          --divider: rgba(9, 30, 66, 0.13);
          --accent: #0c66e4;
          --accent-hover: #0052cc;
          --green: #1d8348;
          --green-bg: rgba(29, 131, 72, 0.1);
          --tag-design-bg: rgba(12, 102, 228, 0.1);
          --tag-design-text: #0c66e4;
          --tag-story-bg: rgba(120, 56, 219, 0.1);
          --tag-story-text: #7838db;
          --tag-dev-bg: rgba(29, 131, 72, 0.1);
          --tag-dev-text: #1d8348;
          --checkbox-border: rgba(9, 30, 66, 0.3);
          --start-btn: #0c66e4;
          --start-btn-hover: #0052cc;
          --start-btn-disabled: rgba(12, 102, 228, 0.35);
          --search-bg: rgba(9, 30, 66, 0.06);
          --search-focus: rgba(12, 102, 228, 0.2);
        }
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: var(--surface);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        font-size: 14px;
        overflow: hidden;
      }

      .popup {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-height: 560px;
      }

      /* ── Header ── */
      .popup-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 10px;
        flex-shrink: 0;
      }

      .popup-header h2 {
        font-size: 15px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 7px;
        letter-spacing: -0.01em;
      }

      .popup-header h2 .bolt {
        color: var(--accent);
        font-size: 16px;
      }

      .gear-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--muted);
        font-size: 16px;
        padding: 4px;
        border-radius: 6px;
        line-height: 1;
        transition: color 0.15s, background 0.15s;
      }

      .gear-btn:hover {
        color: var(--text);
        background: var(--search-bg);
      }

      /* ── Sub-label ── */
      .sub-label {
        padding: 0 16px 10px;
        font-size: 12px;
        color: var(--muted);
        flex-shrink: 0;
      }

      /* ── Search ── */
      .search-wrap {
        padding: 0 16px 10px;
        flex-shrink: 0;
        position: relative;
      }

      .search-wrap .search-icon {
        position: absolute;
        left: 26px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 13px;
        pointer-events: none;
      }

      #searchInput {
        width: 100%;
        padding: 8px 12px 8px 32px;
        background: var(--search-bg);
        border: 1px solid transparent;
        border-radius: 8px;
        color: var(--text);
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s, background 0.15s;
      }

      #searchInput::placeholder { color: var(--muted); }

      #searchInput:focus {
        border-color: var(--accent);
        background: var(--search-focus);
      }

      /* ── Section labels ── */
      .section-label {
        padding: 6px 16px 4px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
        flex-shrink: 0;
      }

      /* ── Card list ── */
      .card-list {
        flex: 1;
        overflow-y: auto;
        padding: 2px 8px;
        scrollbar-width: thin;
        scrollbar-color: var(--divider) transparent;
      }

      .card-list::-webkit-scrollbar { width: 4px; }
      .card-list::-webkit-scrollbar-track { background: transparent; }
      .card-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 99px; }

      .card-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 8px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.12s;
        user-select: none;
      }

      .card-item:hover { background: var(--search-bg); }
      .card-item.selected { background: var(--green-bg); }

      /* Custom checkbox */
      .cb-wrap {
        flex-shrink: 0;
        width: 18px;
        height: 18px;
        border: 2px solid var(--checkbox-border);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.15s, background 0.15s;
      }

      .card-item.selected .cb-wrap {
        background: var(--green);
        border-color: var(--green);
      }

      .cb-check {
        display: none;
        color: #fff;
        font-size: 11px;
        font-weight: 800;
        line-height: 1;
      }

      .card-item.selected .cb-check { display: block; }

      .card-name {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text);
      }

      .card-tag {
        flex-shrink: 0;
        font-size: 11px;
        font-weight: 600;
        padding: 2px 7px;
        border-radius: 4px;
      }

      .tag-design { background: var(--tag-design-bg); color: var(--tag-design-text); }
      .tag-story  { background: var(--tag-story-bg);  color: var(--tag-story-text); }
      .tag-dev    { background: var(--tag-dev-bg);    color: var(--tag-dev-text); }

      /* Section divider */
      .section-group { margin-bottom: 4px; }

      .empty-state {
        padding: 24px 16px;
        text-align: center;
        color: var(--muted);
        font-size: 13px;
      }

      /* ── Footer ── */
      .popup-footer {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--divider);
        flex-shrink: 0;
      }

      .selected-count {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
        transition: color 0.15s;
      }

      .selected-count.has-selection { color: var(--text); }

      #startMappingBtn {
        padding: 8px 18px;
        border: none;
        border-radius: 8px;
        background: var(--start-btn);
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
        letter-spacing: 0.01em;
      }

      #startMappingBtn:hover:not(:disabled) { background: var(--start-btn-hover); }

      #startMappingBtn:disabled {
        background: var(--start-btn-disabled);
        cursor: not-allowed;
      }

      /* Loading state */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
        color: var(--muted);
        font-size: 13px;
        gap: 8px;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--divider);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div class="popup">
      <!-- Header -->
      <div class="popup-header">
        <h2><span class="bolt">⚡</span> Progress Cards</h2>
        <button class="gear-btn" id="gearBtn" title="Settings">⚙️</button>
      </div>

      <div class="sub-label">Select cards to start mapping progress</div>

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search cards…" autocomplete="off" />
      </div>

      <!-- Card list -->
      <div class="card-list" id="cardList">
        <div class="loading"><div class="spinner"></div> Loading cards…</div>
      </div>

      <!-- Footer -->
      <div class="popup-footer">
        <span class="selected-count" id="selectedCount">0 cards selected</span>
        <button id="startMappingBtn" disabled>Start Mapping</button>
      </div>
    </div>

    <script src="./progress-cards.js?v=20260601-1"></script>
  </body>
</html>
