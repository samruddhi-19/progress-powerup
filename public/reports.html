<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./report-data.js"></script>

    <style>
      :root{
        /* Dark only */
        --bg:#1d2125;--card:#22272b;--text:#e2e8ee;--dim:#8590a2;--muted:#6b788a;
        --border:rgba(255,255,255,.08);--track:rgba(255,255,255,.12);
        --green-fg:#6ee7b7;--green-bg:rgba(75,206,151,.12);--blue-fg:#85b8ff;--blue-bg:rgba(87,157,255,.12);
        --amber-fg:#fbbf7c;--amber-bg:rgba(245,160,95,.12);--red-fg:#ff8f8f;--red-bg:rgba(229,72,77,.14);
        --export-bg:#0c66e4;--export-fg:#fff;--accent:#579dff;
      }
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{background:var(--bg);color:var(--text);font-family:"DM Sans",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;font-size:13px}
      .wrap{padding:14px 16px 16px;max-width:1000px;margin:0 auto}
      .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
      .topbar h1{font-size:16px;font-weight:700}
      .seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
      .seg button{padding:7px 14px;font-family:inherit;font-size:12px;background:transparent;color:var(--dim);border:none;cursor:pointer}
      .seg button.on{background:var(--card);color:var(--text);font-weight:600}
      .card{background:var(--card);border:1px solid var(--border);border-radius:11px}
      .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:10px}
      .metric{padding:13px 12px;display:flex;align-items:center;gap:10px;position:relative;cursor:default;min-width:0}
      .chip{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
      .chip svg{width:18px;height:18px}
      .metric .mtext{min-width:0;flex:1}
      .metric .val{font-size:22px;font-weight:700;line-height:1.1}
      .metric .lbl{font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .metric .tip{position:absolute;left:50%;transform:translateX(-50%) translateY(4px);top:calc(100% + 6px);background:#2c333a;border:1px solid rgba(255,255,255,.12);color:var(--text);font-size:11.5px;line-height:1.45;padding:8px 11px;border-radius:8px;width:max-content;max-width:200px;text-align:center;opacity:0;pointer-events:none;transition:opacity .15s ease,transform .15s ease;z-index:10;box-shadow:0 6px 18px rgba(0,0,0,.35)}
      .metric:hover{border-color:rgba(255,255,255,.16)}
      .metric:hover .tip{opacity:1;transform:translateX(-50%) translateY(0)}
      .charts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-bottom:10px}
      .chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
      .chart-head .ct{font-size:12px;font-weight:600;color:var(--text)}
      .chart-head .ch{font-size:10px;color:var(--dim)}
      .charts .card > svg{display:block;width:100%;height:118px}
      .prod{display:flex;align-items:center;gap:11px;padding:10px 14px;margin-bottom:12px}
      .prod .chip{width:30px;height:30px;border-radius:8px}
      .prod .chip svg{width:15px;height:15px}
      .prod .cap{font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
      .prod .day{font-size:14px;font-weight:600;color:var(--text)}
      .prod .note{margin-left:auto;font-size:11px;color:var(--dim);text-align:right}
      .sec-h{font-size:12px;font-weight:600;margin-bottom:6px}
      table{width:100%;border-collapse:collapse;table-layout:fixed}
      th{font-size:9.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 6px;font-weight:600}
      td{padding:9px 6px;font-size:11.5px;border-top:1px solid var(--border)}
      .track{height:5px;border-radius:4px;background:var(--track);overflow:hidden;flex:1}
      .badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
      .export{width:100%;margin-top:12px;padding:10px;background:var(--export-bg);color:var(--export-fg);border:none;border-radius:9px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
      .export svg{width:15px;height:15px}
      .export:hover{filter:brightness(1.08)}
      .state{padding:40px 24px;text-align:center;color:var(--dim)}
      .state h2{font-size:15px;color:var(--text);margin-bottom:6px}
      .state button{margin-top:14px;padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
      .empty-cell{padding:18px;text-align:center;color:var(--muted);font-size:12px}
      svg text{font-family:"DM Sans",sans-serif}
    </style>
  </head>

  <body>
    <div class="wrap" id="app"><div class="state">Loading report…</div></div>

    <script src="./reports.js"></script>
  </body>
</html>
