<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./report-data.js"></script>

    <style>
      :root{
        /* Dark only */
        --bg:#1d2125;--card:#22272b;--text:#e2e8ee;--dim:#8590a2;--muted:#6b788a;
        --border:rgba(255,255,255,.08);--track:rgba(255,255,255,.12);
        --green-fg:#6ee7b7;--green-bg:rgba(75,206,151,.12);--blue-fg:#85b8ff;--blue-bg:rgba(87,157,255,.12);
        --amber-fg:#fbbf7c;--amber-bg:rgba(245,160,95,.12);--red-fg:#ff8f8f;--red-bg:rgba(229,72,77,.14);
        --export-bg:#0c66e4;--export-fg:#fff;--accent:#579dff;
      }
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{background:var(--bg);color:var(--text);font-family:"DM Sans",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;font-size:13px}
      .wrap{padding:14px 16px 16px;max-width:1000px;margin:0 auto}
      .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
      .topbar h1{font-size:16px;font-weight:700}
      .seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
      .seg button{padding:7px 14px;font-family:inherit;font-size:12px;background:transparent;color:var(--dim);border:none;cursor:pointer}
      .seg button.on{background:var(--card);color:var(--text);font-weight:600}
      .card{background:var(--card);border:1px solid var(--border);border-radius:10px}
      .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
      .metric{padding:12px}
      .chip{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
      .chip svg{width:17px;height:17px}
      .metric .val{font-size:22px;font-weight:700;line-height:1}
      .metric .lbl{font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);margin-top:5px}
      .charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
      .chart-h{font-size:12.5px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:7px}
      .chart-h svg{width:17px;height:17px;flex-shrink:0}
      .charts .card > svg{display:block;width:100%;height:130px}
      .prod{display:flex;align-items:center;gap:12px;padding:11px 14px;margin-bottom:12px}
      .prod .cap{font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
      .prod .day{font-size:16px;font-weight:700;margin-top:2px}
      .prod .note{margin-left:auto;font-size:11.5px;color:var(--dim);max-width:230px;text-align:right}
      .sec-h{font-size:12.5px;font-weight:600;margin-bottom:6px}
      table{width:100%;border-collapse:collapse}
      th{font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);text-align:left;padding:7px 8px;font-weight:600}
      td{padding:9px 8px;font-size:12px;border-top:1px solid var(--border)}
      .track{height:6px;border-radius:4px;background:var(--track);overflow:hidden;flex:1}
      .badge{font-size:10.5px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
      .export{width:100%;margin-top:12px;padding:11px;background:var(--export-bg);color:var(--export-fg);border:none;border-radius:9px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
      .export svg{width:17px;height:17px}
      .export:hover{filter:brightness(1.08)}
      .state{padding:40px 24px;text-align:center;color:var(--dim)}
      .state h2{font-size:15px;color:var(--text);margin-bottom:6px}
      .state button{margin-top:14px;padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
      .empty-cell{padding:18px;text-align:center;color:var(--muted);font-size:12px}
      svg text{font-family:"DM Sans",sans-serif}
    </style>
  </head>

  <body>
    <div class="wrap" id="app"><div class="state">Loading report…</div></div>

    <script src="./reports.js"></script>
  </body>
</html>
