<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e2e8f0;
      padding: 0 0 8px 0;
    }

    .card {
      background: #22272b;
      border-radius: 12px;
      overflow: hidden;
    }

    /* ── Header ── */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px 0;
    }

    .header-title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .label-tag {
      font-size: 11.5px;
      font-weight: 700;
      padding: 3px 11px;
      border-radius: 999px;
      background: #00bcd4;
      color: #002830;
    }

    .label-tag.no-label {
      background: rgba(255,255,255,0.08);
      color: #64748b;
    }

    /* ── Card name ── */
    .card-name {
      font-size: 17px;
      font-weight: 800;
      color: #ffffff;
      padding: 8px 16px 14px;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    /* ── Section ── */
    .section {
      padding: 0 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 10px;
    }

    /* ── Completion slider ── */
    .completion-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .completion-label {
      font-size: 14px;
      font-weight: 700;
      color: #e2e8f0;
    }

    .completion-pct {
      font-size: 14px;
      font-weight: 800;
      color: #00bcd4;
      font-family: "SF Mono", monospace;
      min-width: 42px;
      text-align: right;
    }

    .completion-pct.overtime { color: #f43f5e; }

    .slider-wrap {
      position: relative;
      height: 20px;
      display: flex;
      align-items: center;
    }

    .slider-track {
      position: absolute;
      left: 0; right: 0;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      pointer-events: none;
    }

    .slider-fill {
      height: 100%;
      background: linear-gradient(90deg, #00acc1, #26c6da);
      border-radius: 3px;
      transition: width 0.1s;
    }

    .slider-fill.overtime { background: linear-gradient(90deg, #e11d48, #f43f5e); }

    input[type="range"] {
      position: relative;
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: pointer;
      z-index: 2;
      height: 20px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #00bcd4;
      box-shadow: 0 0 8px rgba(0,188,212,0.4);
      transition: transform 0.12s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #00bcd4;
      box-shadow: 0 0 8px rgba(0,188,212,0.4);
    }

    input[type="range"]::-webkit-slider-runnable-track { background: transparent; }
    input[type="range"]::-moz-range-track { background: transparent; }

    /* ── ETA ── */
    .eta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .eta-pre {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
    }

    .eta-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0;
      font-size: 12.5px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .eta-input:focus { border-color: rgba(0,188,212,0.5); }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }

    .eta-amp {
      font-size: 12px;
      color: #475569;
      font-weight: 600;
    }

    /* ── Tasks ── */
    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      transition: background 0.12s;
    }

    .task-item:hover { background: rgba(0,0,0,0.3); }

    .task-cb {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
    }

    .task-cb.checked {
      background: #00bcd4;
      border-color: #00bcd4;
    }

    .task-cb.checked::after {
      content: '✓';
      color: #002830;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .task-name {
      flex: 1;
      font-size: 13px;
      color: #cbd5e1;
      font-weight: 500;
      transition: all 0.15s;
    }

    .task-name.done {
      text-decoration: line-through;
      color: #475569;
    }

    .task-del {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.12s;
      flex-shrink: 0;
    }

    .task-del:hover { color: #f43f5e; }

    /* Add task row */
    .add-task-row {
      display: flex;
      gap: 7px;
    }

    .add-task-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-task-input::placeholder { color: #475569; }
    .add-task-input:focus { border-color: rgba(0,188,212,0.5); }

    .add-task-btn {
      background: rgba(0,188,212,0.15);
      border: 1px solid rgba(0,188,212,0.3);
      color: #00bcd4;
      font-size: 18px;
      font-weight: 700;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .add-task-btn:hover {
      background: rgba(0,188,212,0.25);
      transform: scale(1.05);
    }

    .empty-tasks {
      text-align: center;
      font-size: 12px;
      color: #475569;
      padding: 8px 0 4px;
    }

    /* ── Time Tracking ── */
    .timer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .timer-label-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timer-lbl {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
    }

    .timer-display {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 20px;
      font-weight: 800;
      color: #00bcd4;
      letter-spacing: 0.05em;
      min-width: 80px;
    }

    .timer-display.running {
      animation: timerPulse 1.2s ease-in-out infinite alternate;
    }

    @keyframes timerPulse {
      from { opacity: 0.75; }
      to   { opacity: 1; text-shadow: 0 0 16px rgba(0,188,212,0.6); }
    }

    .timer-controls { display: flex; gap: 8px; }

    .btn-timer-start {
      background: #00bcd4;
      color: #002830;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 7px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .btn-timer-start:hover { background: #26c6da; transform: translateY(-1px); }

    .btn-timer-stop {
      background: rgba(244,63,94,0.15);
      color: #f43f5e;
      border: 1px solid rgba(244,63,94,0.3);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      padding: 7px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .btn-timer-stop:hover { background: rgba(244,63,94,0.25); transform: translateY(-1px); }

    .btn-reset {
      background: rgba(255,255,255,0.05);
      color: #64748b;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      font-size: 13px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .btn-reset:hover { background: rgba(255,255,255,0.1); color: #94a3b8; }

    /* Timer meta */
    .timer-meta {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .timer-meta-pill {
      font-size: 11.5px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.2);
      color: #64748b;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .timer-meta-pill span { color: #00bcd4; font-family: "SF Mono", monospace; font-weight: 700; }

    /* Estimate input */
    .est-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #00bcd4;
      font-family: "SF Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      outline: none;
      width: 72px;
      text-align: center;
    }

    .est-input:focus { border-color: rgba(0,188,212,0.5); }

    /* ── Progress bar at very bottom ── */
    .bottom-bar {
      height: 5px;
      background: rgba(255,255,255,0.06);
      margin-top: 4px;
    }

    .bottom-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00acc1, #26c6da);
      transition: width 0.3s ease;
    }

    .bottom-bar-fill.overtime { background: linear-gradient(90deg, #e11d48, #f43f5e); }

    /* Session ticker */
    .session-ticker {
      background: rgba(0,188,212,0.08);
      border: 1px solid rgba(0,188,212,0.2);
      color: #00bcd4;
      text-align: center;
      font-family: "SF Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      padding: 6px;
      border-radius: 6px;
      margin-top: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; box-shadow: 0 0 8px rgba(0,188,212,0.25); }
    }

    /* ── Activity Log ── */
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .view-toggle {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      overflow: hidden;
    }

    .view-btn {
      background: transparent;
      border: none;
      color: #475569;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      transition: all 0.12s;
    }

    .view-btn.active { background: #00bcd4; color: #002830; }

    .history-list { display: flex; flex-direction: column; gap: 5px; }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11.5px;
      color: #64748b;
      background: rgba(0,0,0,0.15);
      padding: 5px 9px;
      border-radius: 5px;
    }

    .history-item .val {
      color: #00bcd4;
      font-family: "SF Mono", monospace;
      font-weight: 700;
    }

    .show-more-btn {
      background: transparent;
      border: none;
      color: #00bcd4;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 5px 0;
      width: 100%;
      text-align: center;
    }

    .show-more-btn:hover { text-decoration: underline; }

    .chart-svg { width: 100%; height: auto; max-height: 130px; overflow: visible; margin-top: 8px; }
    .chart-bar { transition: 0.2s; }
    .chart-bar:hover { filter: brightness(1.25); }

    .unit-badge {
      font-size: 9px; text-transform: uppercase;
      background: rgba(0,188,212,0.12); color: #00bcd4;
      padding: 2px 6px; border-radius: 12px; margin-left: 5px; font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./card-progress-iframe.js"></script>
</body>
</html>
