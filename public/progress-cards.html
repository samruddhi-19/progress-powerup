<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <style>
      :root {
        --surface: #222428;
        --surface-raised: #2a2d31;
        --surface-overlay: #2c333a;
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.50);
        --divider: rgba(255, 255, 255, 0.10);
        --accent: #00bcd4;
        --accent-hover: #26c6da;
        --accent-bg: rgba(0, 188, 212, 0.10);
        --green: #00bcd4;
        --green-bg: rgba(0, 188, 212, 0.12);
        --tag-design-bg: rgba(0, 188, 212, 0.20);
        --tag-design-text: #00bcd4;
        --tag-story-bg: rgba(0, 188, 212, 0.20);
        --tag-story-text: #00bcd4;
        --tag-dev-bg: rgba(0, 188, 212, 0.20);
        --tag-dev-text: #00bcd4;
        --tag-orange-bg: rgba(0, 188, 212, 0.20);
        --tag-orange-text: #00bcd4;
        --tag-red-bg: rgba(0, 188, 212, 0.20);
        --tag-red-text: #00bcd4;
        --tag-yellow-bg: rgba(0, 188, 212, 0.20);
        --tag-yellow-text: #00bcd4;
        --checkbox-border: rgba(255, 255, 255, 0.28);
        --start-btn: #00bcd4;
        --start-btn-hover: #26c6da;
        --start-btn-disabled: rgba(0, 188, 212, 0.25);
        --search-bg: rgba(255, 255, 255, 0.05);
        --search-focus: rgba(0, 188, 212, 0.08);
        --close-btn-hover: rgba(255, 255, 255, 0.10);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: var(--surface);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        font-size: 14px;
        overflow: hidden;
      }

      .popup {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-height: 560px;
        width: 100%;
      }

      /* ── Header ── */
      .popup-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 14px 10px 16px;
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .popup-header h2 {
        font-size: 18px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 8px;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .bolt-icon {
        color: var(--accent);
        display: flex;
        align-items: center;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border-radius: 6px;
        transition: color 0.12s, background 0.12s;
        flex-shrink: 0;
      }

      .icon-btn:hover {
        color: var(--text);
        background: var(--close-btn-hover);
      }

      .icon-btn svg { width: 16px; height: 16px; fill: currentColor; }

      /* Back button */
      .back-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 600;
        padding: 4px 6px 4px 2px;
        border-radius: 6px;
        transition: opacity 0.12s;
        flex-shrink: 0;
      }

      .back-btn:hover { opacity: 0.75; }
      .back-btn svg { width: 16px; height: 16px; fill: currentColor; }

      /* ── Sub-label ── */
      .sub-label {
        padding: 0 16px 12px;
        font-size: 12.5px;
        color: var(--muted);
        flex-shrink: 0;
      }

      /* ── Search ── */
      .search-wrap {
        padding: 0 12px 12px;
        flex-shrink: 0;
        position: relative;
      }

      .search-icon {
        position: absolute;
        left: 24px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        pointer-events: none;
        display: flex;
        align-items: center;
      }

      .search-icon svg { width: 14px; height: 14px; fill: currentColor; }

      #searchInput {
        width: 100%;
        padding: 9px 12px 9px 38px;
        background: transparent;
        border: 1.5px solid var(--accent);
        border-radius: 10px;
        color: var(--text);
        font-size: 13px;
        outline: none;
        transition: border-color 0.15s, background 0.15s;
      }

      #searchInput::placeholder { color: var(--muted); }

      #searchInput:focus {
        border-color: var(--accent-hover);
        background: var(--search-focus);
      }

      /* ── Section labels ── */
      .section-label {
        padding: 10px 4px 6px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--muted);
        flex-shrink: 0;
      }

      /* ── Scrollable area ── */
      .scroll-area {
        flex: 1;
        overflow-y: auto;
        padding: 2px 12px 4px;
        scrollbar-width: thin;
        scrollbar-color: var(--divider) transparent;
      }

      .scroll-area::-webkit-scrollbar { width: 4px; }
      .scroll-area::-webkit-scrollbar-track { background: transparent; }
      .scroll-area::-webkit-scrollbar-thumb {
        background: var(--divider);
        border-radius: 99px;
      }

      /* ── LIST VIEW ── */
      .list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 14px;
        border-radius: 8px;
        background: var(--surface-raised);
        margin-bottom: 7px;
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s;
        border-left: 3px solid transparent;
        user-select: none;
      }

      .list-item:hover {
        background: var(--accent-bg);
        border-left-color: var(--accent);
      }

      .list-item-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .list-item-name {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .list-item-count {
        font-size: 11.5px;
        color: var(--muted);
        font-weight: 400;
      }

      .list-item-count .selected-in-list {
        color: var(--accent);
        font-weight: 600;
      }

      .list-item-arrow {
        color: var(--muted);
        display: flex;
        align-items: center;
        transition: color 0.12s, transform 0.12s;
      }

      .list-item:hover .list-item-arrow {
        color: var(--accent);
        transform: translateX(2px);
      }

      .list-item-arrow svg { width: 16px; height: 16px; fill: currentColor; }

      /* ── CARD VIEW ── */
      .card-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--surface-raised);
        border-left: 3px solid transparent;
        cursor: pointer;
        transition: background 0.10s, border-color 0.10s;
        user-select: none;
        margin-bottom: 7px;
      }

      .card-item:hover { background: var(--accent-bg); }

      .card-item.selected {
        background: rgba(0, 188, 212, 0.10);
        border-left-color: var(--accent);
      }

      /* Custom checkbox */
      .cb-wrap {
        flex-shrink: 0;
        width: 18px;
        height: 18px;
        border: 1.8px solid var(--checkbox-border);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.12s, background 0.12s;
      }

      .card-item.selected .cb-wrap {
        background: var(--accent);
        border-color: var(--accent);
      }

      .cb-check {
        display: none;
        color: #000;
        font-size: 11px;
        font-weight: 900;
        line-height: 1;
      }

      .card-item.selected .cb-check { display: block; }

      .card-name {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text);
        letter-spacing: -0.005em;
      }

      .card-tag {
        flex-shrink: 0;
        font-size: 11.5px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 999px;
        letter-spacing: 0.01em;
      }

      .tag-design, .tag-story, .tag-dev,
      .tag-orange, .tag-red, .tag-yellow {
        background: var(--tag-design-bg);
        color: var(--tag-design-text);
      }

      .section-group { margin-bottom: 2px; }

      .section-group + .section-group {
        border-top: 1px solid var(--divider);
        padding-top: 4px;
        margin-top: 6px;
      }

      .empty-state {
        padding: 28px 16px;
        text-align: center;
        color: var(--muted);
        font-size: 13px;
      }

      /* ── View transition ── */
      .view {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
        animation: fadeSlideIn 0.18s ease;
      }

      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateX(10px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      @keyframes fadeSlideBack {
        from { opacity: 0; transform: translateX(-10px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      .view.slide-back { animation: fadeSlideBack 0.18s ease; }

      /* ── Footer ── */
      .popup-footer {
        padding: 11px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--divider);
        flex-shrink: 0;
      }

      .selected-count {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
        transition: color 0.15s;
      }

      .selected-count.has-selection { color: var(--text); }

      #startMappingBtn {
        padding: 10px 22px;
        border: none;
        border-radius: 999px;
        background: var(--start-btn);
        color: #000;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        transition: background 0.15s, opacity 0.15s;
        letter-spacing: 0.01em;
      }

      #startMappingBtn:hover:not(:disabled) { background: var(--start-btn-hover); }

      #startMappingBtn:disabled {
        background: var(--start-btn-disabled);
        color: rgba(0,0,0,0.4);
        cursor: not-allowed;
      }

      /* Loading state */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 36px 16px;
        color: var(--muted);
        font-size: 13px;
        gap: 8px;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--divider);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div class="popup">

      <!-- Header -->
      <div class="popup-header">
        <div class="header-left" id="headerLeft">
          <h2>
            <span class="bolt-icon">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="color:var(--accent)">
                <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/>
              </svg>
            </span>
            Progress Cards
          </h2>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="gearBtn" title="Settings">
            <svg viewBox="0 0 24 24">
              <path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.81c-.14-.24-.42-.32-.66-.24l-2.74 1.1c-.57-.44-1.18-.79-1.85-1.06L14.07 2.1C14 1.84 13.77 1.66 13.5 1.66h-3c-.27 0-.5.18-.57.44l-.42 2.9c-.67.27-1.28.62-1.85 1.06L4.92 5c-.24-.08-.52 0-.66.24L2.06 9.05c-.14.23-.08.54.13.7l2.32 1.82C4.47 11.86 4.44 12.21 4.44 12.5s.03.74.07 1.08l-2.32 1.82c-.21.16-.27.46-.13.7l2.2 3.81c.14.24.42.32.66.24l2.74-1.1c.57.44 1.18.79 1.85 1.06l.42 2.9c.07.26.3.44.57.44h3c.27 0 .5-.18.57-.44l.42-2.9c.67-.27 1.28-.62 1.85-1.06l2.74 1.1c.24.08.52 0 .66-.24l2.2-3.81c.14-.24.08-.54-.13-.7l-2.32-1.82z"/>
            </svg>
          </button>
          <button class="icon-btn" id="closeBtn" title="Close">
            <svg viewBox="0 0 24 24">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Dynamic view container -->
      <div id="viewContainer" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
        <div class="loading"><div class="spinner"></div> Loading…</div>
      </div>

      <!-- Footer -->
      <div class="popup-footer">
        <span class="selected-count" id="selectedCount">0 cards selected</span>
        <button id="startMappingBtn" disabled>Start Mapping</button>
      </div>
    </div>

    <script src="./progress-cards.js?v=20260602-2"></script>
    <script>
      document.getElementById('closeBtn').addEventListener('click', function() {
        if (typeof TrelloPowerUp !== 'undefined') {
          const t = TrelloPowerUp.iframe();
          t.closePopup();
        }
      });
    </script>
  </body>
</html>
