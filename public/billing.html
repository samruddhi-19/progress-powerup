<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./config.js"></script>
    <script src="./billing-data.js"></script>

    <style>
      :root {
        --bg: #1d2125;
        --card: #22272b;
        --text: #e2e8ee;
        --soft: #c7d0da;
        --dim: #8590a2;
        --muted: #6b788a;
        --faint: #5c6b7a;
        --border: rgba(255, 255, 255, 0.07);
        --track: rgba(255, 255, 255, 0.08);
        --green-fg: #6ee7b7;
        --green: #4bce97;
        --blue-fg: #85b8ff;
        --amber-fg: #fbbf7c;
        --red-fg: #ff8f8f;
        --export-bg: #0c66e4;
        --accent: #579dff;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          "DM Sans",
          -apple-system,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        font-size: 13px;
        overflow: hidden;
      }
      .wrap {
        padding: 14px 16px 16px;
        max-width: 1000px;
        margin: 0 auto;
        box-sizing: border-box;
      }
      .wrap.scrolls {
        overflow-y: auto;
      }
      .wrap::-webkit-scrollbar {
        width: 7px;
      }
      .wrap::-webkit-scrollbar-track {
        background: transparent;
      }
      .wrap::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.13);
        border-radius: 5px;
      }
      /* header */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }
      .topbar h1 {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--text);
      }
      .topbar .sub {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }
      .sumstrip {
        display: flex;
        gap: 18px;
        align-items: center;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 18px;
      }
      .sumstrip .stat {
        text-align: center;
      }
      .sumstrip .sv {
        display: block;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }
      .sumstrip .sv.green {
        color: var(--green-fg);
      }
      .sumstrip .sl {
        display: block;
        font-size: 9px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 1px;
      }
      .sumstrip .div {
        width: 1px;
        height: 22px;
        background: rgba(255, 255, 255, 0.08);
      }

      /* section heads */
      .tab-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 11px;
        flex-wrap: wrap;
      }
      .tabs { display: flex; gap: 6px; }
      .tab {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 7px 13px;
        font-family: inherit;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--dim);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
      }
      .tab:hover { color: var(--text); }
      .tab.on { color: var(--text); background: rgba(255, 255, 255, 0.07); }
      .tabn {
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.07);
        padding: 1px 7px;
        border-radius: 10px;
        font-variant-numeric: tabular-nums;
      }
      .tab.on .tabn { color: var(--soft); }
      .sec-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 11px;
      }
      .sec-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .sec-h {
        font-size: 12.5px;
        font-weight: 600;
      }
      .pill {
        font-size: 9.5px;
        font-weight: 600;
        color: var(--dim);
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 8px;
        border-radius: 10px;
      }
      .sec-hint {
        font-size: 10.5px;
        color: var(--muted);
      }
      .sec-hint .link {
        color: var(--blue-fg);
      }

      /* tables */
      .table-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 26px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      th {
        text-align: left;
        padding: 12px 16px;
        font-size: 9.5px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--faint);
        font-weight: 600;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      th.r,
      td.r {
        text-align: right;
      }
      th.mid {
        padding: 12px 10px;
      }
      td {
        padding: 15px 16px;
        font-size: 12.5px;
      }
      td.mid {
        padding: 15px 10px;
      }
      tbody tr:nth-child(odd) {
        background: rgba(255, 255, 255, 0.015);
      }
      .tname {
        color: var(--text);
        font-weight: 500;
        white-space: normal;
        overflow-wrap: anywhere;
        line-height: 1.35;
      }
      .tlist {
        font-size: 10.5px;
        color: var(--faint);
        font-weight: 400;
        margin-left: 8px;
      }
      .num {
        font-variant-numeric: tabular-nums;
        color: var(--soft);
        font-size: 12px;
      }
      .amt {
        font-variant-numeric: tabular-nums;
        color: var(--text);
        font-weight: 600;
        font-size: 12.5px;
      }
      .rate {
        font-variant-numeric: tabular-nums;
        color: var(--dim);
        font-size: 12px;
      }
      .avatar-group {
        display: inline-flex;
        align-items: center;
        flex-shrink: 0;
      }
      .avatar-group .avatar-badge {
        margin-right: -6px;
      }
      .avatar-group .avatar-badge:last-child {
        margin-right: 0;
      }
      .avatar-badge {
        display: inline-flex;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        align-items: center;
        justify-content: center;
        font-size: 9.5px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
        border: 1.5px solid var(--card);
      }
      .assignee-cell {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
        max-width: 100%;
      }
      .assignee-name {
        font-size: 11.5px;
        color: var(--soft);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .assignee-more {
        font-size: 10px;
        color: var(--dim);
        background: rgba(255, 255, 255, 0.07);
        padding: 2px 6px;
        border-radius: 10px;
        flex-shrink: 0;
      }

      /* progress */
      .pbar {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .ptrack {
        width: 64px;
        height: 4px;
        border-radius: 3px;
        background: var(--track);
        overflow: hidden;
        display: block;
      }
      .pfill {
        display: block;
        height: 100%;
        border-radius: 3px;
      }
      .ppct {
        font-size: 10.5px;
        color: var(--dim);
        font-variant-numeric: tabular-nums;
        min-width: 30px;
      }

      /* due cell */
      .due {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.red {
        background: var(--red-fg);
        box-shadow: 0 0 6px rgba(255, 143, 143, 0.4);
      }
      .dot.amber {
        background: var(--amber-fg);
      }
      .dot.blue {
        background: var(--blue-fg);
      }
      .dot.green {
        background: var(--green-fg);
      }
      .due-txt {
        font-size: 11.5px;
        color: var(--text);
        font-weight: 500;
      }
      .due-txt.muted {
        color: var(--dim);
      }
      .due-sub {
        font-size: 10.5px;
        color: var(--faint);
      }
      .due-none {
        font-size: 11px;
        color: var(--faint);
      }

      /* billable footer strip */
      .foot-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        background: linear-gradient(
          180deg,
          rgba(75, 206, 151, 0.05),
          rgba(75, 206, 151, 0.02)
        );
        border-top: 1px solid rgba(75, 206, 151, 0.18);
      }
      .foot-strip .fl {
        font-size: 11px;
        color: var(--dim);
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .foot-strip .fr {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      .foot-strip .fh {
        font-size: 10.5px;
        color: var(--muted);
      }
      .foot-strip .fa {
        font-size: 16px;
        color: var(--green-fg);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.01em;
      }

      /* bottom bar */
      .bottom {
        display: block;
      }
      .bottom .note {
        font-size: 10.5px;
        color: var(--faint);
      }
      .export {
        padding: 10px 20px;
        background: var(--export-bg);
        color: #fff;
        border: none;
        border-radius: 9px;
        font-family: inherit;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 2px 10px rgba(12, 102, 228, 0.25);
      }
      .export.sm {
        padding: 7px 14px;
        font-size: 11.5px;
        border-radius: 8px;
        gap: 6px;
      }
      .export.sm svg {
        width: 13px;
        height: 13px;
      }
      .export:hover {
        filter: brightness(1.08);
      }
      .export svg {
        width: 15px;
        height: 15px;
      }

      /* ── Invoice builder overlay ── */
      .ov {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 34px 20px;
        z-index: 50;
        overflow-y: auto;
      }
      .ov[hidden] {
        display: none;
      }
      .inv {
        width: 100%;
        max-width: 660px;
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 12px;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }
      .inv-head {
        padding: 16px 18px 13px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .inv-head .r1 {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .inv-head .t {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
      }
      .inv-x {
        background: none;
        border: none;
        color: var(--dim);
        cursor: pointer;
        padding: 4px;
        border-radius: 6px;
        display: flex;
        font-size: 0;
      }
      .inv-x:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
      }
      .inv-x svg {
        width: 15px;
        height: 15px;
      }
      .nm {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-top: 9px;
        cursor: pointer;
        width: fit-content;
      }
      .nm .txt {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
      }
      .nm .txt.placeholder {
        color: var(--faint);
      }
      .nm svg {
        width: 13px;
        height: 13px;
        color: var(--faint);
      }
      .nm:hover svg {
        color: var(--dim);
      }
      .nm-edit {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 9px;
      }
      .nm-edit input {
        flex: 1;
        background: var(--bg);
        border: 1px solid rgba(87, 157, 255, 0.5);
        border-radius: 8px;
        padding: 8px 11px;
        font-family: inherit;
        font-size: 13px;
        color: var(--text);
        outline: none;
      }
      .nm-ok {
        width: 32px;
        height: 32px;
        background: rgba(75, 206, 151, 0.15);
        border: 1px solid rgba(75, 206, 151, 0.35);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }
      .nm-ok:hover {
        background: rgba(75, 206, 151, 0.25);
      }
      .nm-ok svg {
        width: 15px;
        height: 15px;
        color: var(--green-fg);
      }
      .nm-hint {
        font-size: 10.5px;
        color: var(--faint);
        margin-top: 7px;
      }
      .inv-list {
        max-height: 320px;
        overflow-y: auto;
      }
      .inv-list::-webkit-scrollbar {
        width: 7px;
      }
      .inv-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .inv-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.13);
        border-radius: 5px;
      }
      .inv tbody tr {
        cursor: pointer;
      }
      .inv tbody tr.on {
        background: rgba(87, 157, 255, 0.05);
      }
      .inv tbody tr.off td {
        color: var(--muted);
      }
      .inv tbody tr.off .tname {
        color: var(--dim);
      }
      .inv tbody tr.off .amt {
        color: var(--muted);
      }
      .cb {
        width: 15px;
        height: 15px;
        border-radius: 4px;
        border: 1.5px solid rgba(255, 255, 255, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .cb.on {
        background: var(--export-bg);
        border-color: var(--export-bg);
      }
      .cb svg {
        width: 11px;
        height: 11px;
        color: #fff;
      }
      .inv-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 18px;
        background: linear-gradient(
          180deg,
          rgba(75, 206, 151, 0.05),
          rgba(75, 206, 151, 0.02)
        );
        border-top: 1px solid rgba(75, 206, 151, 0.18);
      }
      .inv-foot .fl {
        font-size: 11px;
        color: var(--dim);
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .inv-foot .fa {
        font-size: 16px;
        color: var(--green-fg);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .inv-act {
        padding: 14px 18px;
      }
      .inv-act button {
        width: 100%;
        padding: 11px;
        background: var(--export-bg);
        color: #fff;
        border: none;
        border-radius: 9px;
        font-family: inherit;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 2px 10px rgba(12, 102, 228, 0.25);
      }
      .inv-act button:hover {
        filter: brightness(1.08);
      }
      .inv-act button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
      }
      .inv-act button svg {
        width: 15px;
        height: 15px;
      }
      .norate {
        display: inline-block;
        font-size: 9.5px;
        color: var(--blue-fg);
        background: rgba(87, 157, 255, 0.12);
        border: 1px solid rgba(87, 157, 255, 0.28);
        padding: 3px 8px;
        border-radius: 20px;
        white-space: nowrap;
      }
      .norate-wrap {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 3px;
      }
      .norate-sub {
        font-size: 9px;
        color: var(--faint);
        white-space: nowrap;
      }
      .callout {
        display: flex;
        gap: 11px;
        align-items: flex-start;
        background: var(--card);
        border: 1px solid rgba(87, 157, 255, 0.2);
        border-radius: 10px;
        padding: 12px 15px;
        margin-top: 14px;
      }
      .callout > span:not(.ci) {
        flex: 1;
        min-width: 0;
      }
      .callout .ci {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: rgba(87, 157, 255, 0.14);
        color: var(--blue-fg);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .callout .ci svg {
        width: 14px;
        height: 14px;
      }
      .callout .ctext {
        flex: 1;
        min-width: 0;
      }
      .callout .ct {
        display: block;
        font-size: 11px;
        color: var(--text);
        font-weight: 600;
        margin-bottom: 4px;
      }
      .callout .cdesc {
        display: block;
        font-size: 10.5px;
        color: var(--dim);
        line-height: 1.6;
      }
      .callout .cdesc strong {
        color: var(--soft);
        font-weight: 600;
      }
      .empty-cell {
        padding: 20px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }
      .state {
        padding: 40px 24px;
        text-align: center;
        color: var(--dim);
      }
      .state h2 {
        font-size: 15px;
        color: var(--text);
        margin-bottom: 6px;
      }
      .state button {
        margin-top: 14px;
        padding: 10px 18px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="wrap" id="app"><div class="state">Loading billing…</div></div>
    <script src="./billing.js"></script>
  </body>
</html>
