<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./config.js"></script>
    <script src="./billing-data.js"></script>

    <style>
      :root {
        --bg: #1d2125;
        --card: #22272b;
        --text: #e2e8ee;
        --soft: #c7d0da;
        --dim: #8590a2;
        --muted: #6b788a;
        --faint: #5c6b7a;
        --border: rgba(255, 255, 255, 0.07);
        --track: rgba(255, 255, 255, 0.08);
        --green-fg: #6ee7b7;
        --green: #4bce97;
        --blue-fg: #85b8ff;
        --amber-fg: #fbbf7c;
        --red-fg: #ff8f8f;
        --export-bg: #0c66e4;
        --accent: #579dff;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          "DM Sans",
          -apple-system,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        font-size: 13px;
      }
      .wrap {
        padding: 24px 28px 24px;
        max-width: 1000px;
        margin: 0 auto;
      }

      /* header */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }
      .topbar h1 {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      .topbar .sub {
        font-size: 11px;
        color: var(--muted);
        margin-top: 3px;
      }
      .sumstrip {
        display: flex;
        gap: 18px;
        align-items: center;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 18px;
      }
      .sumstrip .stat {
        text-align: center;
      }
      .sumstrip .sv {
        display: block;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }
      .sumstrip .sv.green {
        color: var(--green-fg);
      }
      .sumstrip .sl {
        display: block;
        font-size: 9px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 1px;
      }
      .sumstrip .div {
        width: 1px;
        height: 22px;
        background: rgba(255, 255, 255, 0.08);
      }

      /* section heads */
      .sec-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 11px;
      }
      .sec-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .sec-h {
        font-size: 12.5px;
        font-weight: 600;
      }
      .pill {
        font-size: 9.5px;
        font-weight: 600;
        color: var(--dim);
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 8px;
        border-radius: 10px;
      }
      .sec-hint {
        font-size: 10.5px;
        color: var(--muted);
      }
      .sec-hint .link {
        color: var(--blue-fg);
      }

      /* tables */
      .table-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 26px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      th {
        text-align: left;
        padding: 12px 16px;
        font-size: 9.5px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--faint);
        font-weight: 600;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      th.r,
      td.r {
        text-align: right;
      }
      th.mid {
        padding: 12px 10px;
      }
      td {
        padding: 15px 16px;
        font-size: 12.5px;
      }
      td.mid {
        padding: 15px 10px;
      }
      tbody tr:nth-child(odd) {
        background: rgba(255, 255, 255, 0.015);
      }
      .tname {
        color: var(--text);
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tlist {
        font-size: 10.5px;
        color: var(--faint);
        font-weight: 400;
        margin-left: 8px;
      }
      .num {
        font-variant-numeric: tabular-nums;
        color: var(--soft);
        font-size: 12px;
      }
      .amt {
        font-variant-numeric: tabular-nums;
        color: var(--text);
        font-weight: 600;
        font-size: 12.5px;
      }
      .rate {
        font-variant-numeric: tabular-nums;
        color: var(--dim);
        font-size: 12px;
      }

      /* progress */
      .pbar {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .ptrack {
        width: 64px;
        height: 4px;
        border-radius: 3px;
        background: var(--track);
        overflow: hidden;
        display: block;
      }
      .pfill {
        display: block;
        height: 100%;
        border-radius: 3px;
      }
      .ppct {
        font-size: 10.5px;
        color: var(--dim);
        font-variant-numeric: tabular-nums;
        min-width: 30px;
      }

      /* due cell */
      .due {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.red {
        background: var(--red-fg);
        box-shadow: 0 0 6px rgba(255, 143, 143, 0.4);
      }
      .dot.amber {
        background: var(--amber-fg);
      }
      .dot.blue {
        background: var(--blue-fg);
      }
      .dot.green {
        background: var(--green-fg);
      }
      .due-txt {
        font-size: 11.5px;
        color: var(--text);
        font-weight: 500;
      }
      .due-txt.muted {
        color: var(--dim);
      }
      .due-sub {
        font-size: 10.5px;
        color: var(--faint);
      }
      .due-none {
        font-size: 11px;
        color: var(--faint);
      }

      /* billable footer strip */
      .foot-strip {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        background: linear-gradient(
          180deg,
          rgba(75, 206, 151, 0.05),
          rgba(75, 206, 151, 0.02)
        );
        border-top: 1px solid rgba(75, 206, 151, 0.18);
      }
      .foot-strip .fl {
        font-size: 11px;
        color: var(--dim);
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .foot-strip .fr {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      .foot-strip .fh {
        font-size: 10.5px;
        color: var(--muted);
      }
      .foot-strip .fa {
        font-size: 16px;
        color: var(--green-fg);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.01em;
      }

      /* bottom bar */
      .bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .bottom .note {
        font-size: 10.5px;
        color: var(--faint);
      }
      .export {
        padding: 10px 20px;
        background: var(--export-bg);
        color: #fff;
        border: none;
        border-radius: 9px;
        font-family: inherit;
        font-size: 12.5px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 2px 10px rgba(12, 102, 228, 0.25);
      }
      .export.sm {
        padding: 7px 14px;
        font-size: 11.5px;
        border-radius: 8px;
        gap: 6px;
      }
      .export.sm svg {
        width: 13px;
        height: 13px;
      }
      .export:hover {
        filter: brightness(1.08);
      }
      .export svg {
        width: 15px;
        height: 15px;
      }

      .empty-cell {
        padding: 20px;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }
      .state {
        padding: 40px 24px;
        text-align: center;
        color: var(--dim);
      }
      .state h2 {
        font-size: 15px;
        color: var(--text);
        margin-bottom: 6px;
      }
      .state button {
        margin-top: 14px;
        padding: 10px 18px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="wrap" id="app"><div class="state">Loading billing…</div></div>
    <script src="./billing.js"></script>
  </body>
</html>
