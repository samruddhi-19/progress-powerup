<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://p.trellocdn.com/power-up.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap");

      :root {
        --bg: #1d2125;
        --surface: #282e33;
        --surface-2: #2f3640;
        --surface-3: #384350;
        --border: rgba(255, 255, 255, 0.09);
        --border-hover: rgba(255, 255, 255, 0.16);
        --text: #b6c2cf;
        --text-strong: #e2e8ee;
        --text-dim: #6b788a;
        --accent: #6366f1;
        --accent-dim: rgba(99, 102, 241, 0.1);
        --accent-hover: rgba(99, 102, 241, 0.18);
        --bolt-color: #6366f1;
        --bolt-bg: rgba(99, 102, 241, 0.12);
        --btn-color: #6366f1;
        --btn-hover: #4f46e5;
        --accent-hover: rgba(87, 157, 255, 0.18);
        --green: #4bce97;
        --radius: 8px;
        --radius-sm: 5px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          "DM Sans",
          -apple-system,
          sans-serif;
        font-size: 13px;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .popup {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-height: 560px;
        width: 100%;
      }

      /* ── Header ── */
      .popup-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 14px 12px;
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header-icon {
        color: var(--bolt-color);
        display: flex;
        align-items: center;
        background: var(--bolt-bg);
        padding: 5px;
        border-radius: 6px;
      }

      .popup-header h2 {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-strong);
        letter-spacing: -0.02em;
      }

      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: var(--radius-sm);
        transition: all 0.12s;
      }

      .icon-btn:hover {
        color: var(--text);
        background: var(--surface-2);
      }
      .icon-btn svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }

      /* ── Divider ── */
      .header-divider {
        height: 1px;
        background: var(--border);
        margin: 0 14px;
        flex-shrink: 0;
      }

      /* ── Back btn ── */
      .back-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 4px;
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 600;
        padding: 3px 6px 3px 2px;
        border-radius: var(--radius-sm);
        transition: opacity 0.12s;
      }

      .back-btn:hover {
        opacity: 0.75;
      }
      .back-btn svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }

      /* ── Sub-label ── */
      .sub-label {
        padding: 10px 14px 8px;
        font-size: 11.5px;
        color: var(--text-dim);
        flex-shrink: 0;
        letter-spacing: 0.01em;
      }

      /* ── Search ── */
      .search-wrap {
        padding: 0 12px 10px;
        flex-shrink: 0;
        position: relative;
      }

      .search-icon {
        position: absolute;
        left: 23px;
        top: 50%;
        transform: translateY(-58%);
        color: var(--text-dim);
        pointer-events: none;
        display: flex;
        align-items: center;
      }

      .search-icon svg {
        width: 13px;
        height: 13px;
        fill: currentColor;
      }

      #searchInput {
        width: 100%;
        padding: 8px 12px 8px 34px;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 12.5px;
        outline: none;
        transition:
          border-color 0.15s,
          background 0.15s;
      }

      #searchInput::placeholder {
        color: var(--text-dim);
      }
      #searchInput:focus {
        border-color: var(--accent);
        background: var(--surface-2);
      }

      /* ── Scrollable area ── */
      .scroll-area {
        flex: 1;
        overflow-y: auto;
        padding: 2px 12px 6px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .scroll-area::-webkit-scrollbar {
        width: 3px;
      }
      .scroll-area::-webkit-scrollbar-track {
        background: transparent;
      }
      .scroll-area::-webkit-scrollbar-thumb {
        background: var(--surface-3);
        border-radius: 99px;
      }

      /* ── LIST VIEW ── */
      .list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 12px;
        border-radius: var(--radius);
        background: var(--surface);
        margin-bottom: 5px;
        cursor: pointer;
        transition: all 0.12s;
        border: 1px solid var(--border);
        border-left: 3px solid transparent;
        user-select: none;
      }

      .list-item:hover {
        background: var(--surface-2);
        border-color: var(--border-hover);
        border-left-color: var(--accent);
      }

      .list-item-left {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .list-item-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-strong);
        letter-spacing: -0.01em;
      }

      .list-item-count {
        font-size: 11px;
        color: var(--text-dim);
      }

      .list-item-count .selected-in-list {
        color: var(--accent);
        font-weight: 600;
      }

      .list-item-arrow {
        color: var(--text-dim);
        display: flex;
        align-items: center;
        transition: all 0.12s;
      }

      .list-item:hover .list-item-arrow {
        color: var(--accent);
        transform: translateX(2px);
      }

      .list-item-arrow svg {
        width: 15px;
        height: 15px;
        fill: currentColor;
      }

      /* ── CARD VIEW ── */
      .card-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 9px 12px;
        border-radius: var(--radius);
        background: var(--surface);
        border: 1px solid var(--border);
        border-left: 3px solid transparent;
        cursor: pointer;
        transition: all 0.12s;
        user-select: none;
        margin-bottom: 5px;
      }

      .card-item:hover {
        background: var(--surface-2);
        border-color: var(--border-hover);
      }

      .card-item.selected {
        background: var(--accent-dim);
        border-color: rgba(87, 157, 255, 0.2);
        border-left-color: var(--accent);
      }

      .cb-wrap {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        border: 1.5px solid var(--border-hover);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.12s;
      }

      .card-item.selected .cb-wrap {
        background: var(--accent);
        border-color: var(--accent);
      }

      .cb-check {
        display: none;
        color: #fff;
        font-size: 9px;
        font-weight: 900;
        line-height: 1;
      }

      .card-item.selected .cb-check {
        display: block;
      }

      .card-name {
        flex: 1;
        font-size: 12.5px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text);
      }

      .card-tag {
        flex-shrink: 0;
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 99px;
        letter-spacing: 0.01em;
      }

      .tag-green {
        background: rgba(75, 206, 151, 0.12);
        color: #4bce97;
      }
      .tag-blue {
        background: rgba(87, 157, 255, 0.12);
        color: #579dff;
      }
      .tag-purple {
        background: rgba(159, 143, 239, 0.12);
        color: #9f8fef;
      }
      .tag-pink {
        background: rgba(231, 116, 187, 0.12);
        color: #e774bb;
      }
      .tag-red {
        background: rgba(248, 113, 104, 0.12);
        color: #f87168;
      }
      .tag-orange {
        background: rgba(254, 163, 98, 0.12);
        color: #fea362;
      }
      .tag-yellow {
        background: rgba(245, 205, 71, 0.12);
        color: #f5cd47;
      }
      .tag-black {
        background: rgba(255, 255, 255, 0.06);
        color: #596773;
      }
      .tag-default {
        background: rgba(148, 163, 184, 0.1);
        color: #8c9bab;
      }

      .empty-state {
        padding: 32px 12px;
        text-align: center;
        color: var(--text-dim);
        font-size: 12px;
        line-height: 1.6;
      }

      /* ── View transitions ── */
      .view {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
        animation: fadeIn 0.15s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @keyframes fadeBack {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .view.slide-back {
        animation: fadeBack 0.15s ease;
      }

      /* ── Footer ── */
      .popup-footer {
        padding: 10px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg);
      }

      .selected-count {
        font-size: 11.5px;
        color: var(--text-dim);
        font-weight: 500;
      }

      .selected-count.has-selection {
        color: var(--text-strong);
        font-weight: 600;
      }

      #startMappingBtn {
        padding: 7px 16px;
        border: none;
        border-radius: var(--radius);
        background: var(--btn-color);
        color: #1d2125;
        font-family: "DM Sans", sans-serif;
        font-size: 12.5px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.12s;
        letter-spacing: 0.01em;
      }

      #startMappingBtn:hover:not(:disabled) {
        background: var(--btn-hover);
        transform: translateY(-1px);
      }

      #startMappingBtn:disabled {
        background: rgba(99, 102, 241, 0.15);
        color: rgba(99, 102, 241, 0.35);
        cursor: not-allowed;
      }

      /* ── Loading ── */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 36px 12px;
        color: var(--text-dim);
        font-size: 12px;
        gap: 8px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="popup">
      <!-- Header -->
      <div class="popup-header">
        <div class="header-left" id="headerLeft">
          <span class="header-icon">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor">
              <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z" />
            </svg>
          </span>
          <div>
            <h2>Progress Cards</h2>
            <div
              style="
                font-size: 10.5px;
                color: var(--text-dim);
                font-weight: 400;
                margin-top: 1px;
                letter-spacing: 0.01em;
              "
            >
              Select cards to track
            </div>
          </div>
        </div>
        <div>
          <button class="icon-btn" id="gearBtn" title="Settings">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.81c-.14-.24-.42-.32-.66-.24l-2.74 1.1c-.57-.44-1.18-.79-1.85-1.06L14.07 2.1C14 1.84 13.77 1.66 13.5 1.66h-3c-.27 0-.5.18-.57.44l-.42 2.9c-.67.27-1.28.62-1.85 1.06L4.92 5c-.24-.08-.52 0-.66.24L2.06 9.05c-.14.23-.08.54.13.7l2.32 1.82C4.47 11.86 4.44 12.21 4.44 12.5s.03.74.07 1.08l-2.32 1.82c-.21.16-.27.46-.13.7l2.2 3.81c.14.24.42.32.66.24l2.74-1.1c.57.44 1.18.79 1.85 1.06l.42 2.9c.07.26.3.44.57.44h3c.27 0 .5-.18.57-.44l.42-2.9c.67-.27 1.28-.62 1.85-1.06l2.74 1.1c.24.08.52 0 .66-.24l2.2-3.81c.14-.24.08-.54-.13-.7l-2.32-1.82z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- Dynamic view container -->
      <div
        id="viewContainer"
        style="flex: 1; overflow: hidden; display: flex; flex-direction: column"
      >
        <div class="loading">
          <div class="spinner"></div>
          Loading…
        </div>
      </div>

      <!-- Footer -->
      <div class="popup-footer">
        <span class="selected-count" id="selectedCount">0 cards selected</span>
        <button id="startMappingBtn" disabled>Save Mapping</button>
      </div>
    </div>

    <script src="./progress-cards.js?v=20260602-2"></script>
  </body>
</html>
